<!DOCTYPE html>
<html>
<head>
  <title>Service Report</title>
  <link rel="stylesheet" href="/report.css">
</head>

<body>

<div class="report-page">

    <div class="report-header">
        <div class="header-left">
          <button class="back-btn" onclick="goBack()">Back</button>
          <h1>SERVICE REPORT</h1>
        </div>
        <button class="start-btn" onclick="startTask()">Start Task</button>
      </div>
      

  <!-- INFO BOX -->
  <div class="report-info">
    <div>
      <p class="label">Report ID</p>
      <p>SR-<span id="taskId"></span></p>
    </div>

    <div>
      <p class="label">Task</p>
      <p id="title"></p>
    </div>

    <div>
      <p class="label">Customer</p>
      <p id="customer"></p>
    </div>

    <div>
      <p class="label">Technician</p>
      <p id="technician"></p>
    </div>
  </div>

  <!-- ISSUE -->
  <div class="report-card">
    <h3>Issue Description</h3>
    <textarea id="problemDescription" placeholder="Describe the problem..."></textarea>
  </div>

  <!-- SOLUTION -->
  <div class="report-card">
    <h3>Solution Implemented</h3>
    <textarea id="workPerformed" placeholder="Describe the work performed..."></textarea>
  </div>

    <!-- Billeder -->
  <div class="image-upload-section">

    <div class="image-box">
      <p>Before Photo</p>
      <label class="upload-box">
        <img src="/camera.png" alt="upload">
        <input type="file" hidden>
      </label>
    </div>
  
    <div class="image-box">
      <p>After Photo</p>
      <label class="upload-box">
        <img src="/camera.png" alt="upload">
        <input type="file" hidden>
      </label>
    </div>
  
  </div>

  <!-- TIME -->
  <div class="report-card">
    <h3>Time Spent</h3>
    <p><span id="time">0</span> min</p>
  </div>

  <!-- ACTION -->
  <div class="action-buttons">
    <button class="save-btn" onclick="saveDraft()">Save Draft</button>
    <button class="submit-btn" onclick="submitReport()">Submit Report</button>
  </div>

</div>

<script>
  // Henter task id fra URL
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  // Går tilbage til forsiden
  function goBack() {
  window.location.href = "/";
}

// Henter opgave data og starter live timer hvis opgaven er startet
fetch("/tasks/" + id)
  .then(res => res.json())
  .then(task => {
    document.getElementById("taskId").innerText = task.id;
    document.getElementById("title").innerText = task.title;
    document.getElementById("customer").innerText = task.customer;
    document.getElementById("technician").innerText = task.technician_name;

    if (task.start_time) {
      let startTime = new Date(task.start_time).getTime();

      setInterval(() => {
        let now = Date.now();
        let diff = Math.floor((now - startTime) / 60000);

        document.getElementById("time").innerText = diff;
      }, 1000);
    }
  });

// Starter opgaven og gemmer starttid i databasen
function startTask() {
  fetch("/tasks/" + id + "/start", {
    method: "POST"
  })
    .then(res => res.json())
    .then(data => {
      console.log("Started at:", data.start_time);
      location.reload();
    });
}

// Afslutter opgaven, beregner tid og gemmer servicerapport
function submitReport() {
  fetch("/tasks/" + id + "/submit", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      problem_description: document.getElementById("problemDescription").value,
      work_performed: document.getElementById("workPerformed").value,
      images: ""
    })
  })
    .then(res => res.json())
    .then(data => {
      alert("Report submitted. Time spent: " + data.time_spent + " minutes");
      window.location.href = "/";
    });
}

// Gemmer servicerapport og sætter opgaven til IN PROGRESS
function saveDraft() {
  fetch("/tasks/" + id + "/save-draft", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      problem_description: document.getElementById("problemDescription").value,
      work_performed: document.getElementById("workPerformed").value
    })
  })
    .then(res => res.json())
    .then(data => {
      alert("Draft saved!");
    });
}
</script>

</body>
</html>

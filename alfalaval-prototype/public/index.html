<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/style.css">
  <title>Work Order Queue</title>
</head>

<body>

<h1>Work Order Queue</h1>

<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Task Description</th>
      <th>Priority</th>
      <th>Status</th>
      <th>Created</th>
      <th>Service report</th>
    </tr>
  </thead>

  <tbody id="tasks"></tbody>
</table>

<script>
fetch("/tasks")
  .then(res => res.json())
  .then(tasks => {
    const tbody = document.getElementById("tasks");

    tasks.forEach(task => {
      const row = document.createElement("tr");



      // priority class
      let priorityClass = "";

        if (task.priority === "URGENT") priorityClass = "priority-high";
        if (task.priority === "NORMAL") priorityClass = "priority-medium";
        if (task.priority === "LOW") priorityClass = "priority-low";

      row.innerHTML = `
        <td>WO-${task.id}</td>

        <td>
          <strong>${task.title}</strong><br>
          <small>${task.skill_required}</small>
        </td>

        <td class="${priorityClass}">
          ${task.priority}
        </td>

        <td>
          <span class="status">${task.status}</span>
        </td>

        <td>${task.date}</td>

        <td>
          <button onclick="goToTask(${task.id})">
            Open report
          </button>
        </td>
      `;

      tbody.appendChild(row);
    });
  });

function goToTask(id) {
  window.location.href = "/task.html?id=" + id;
}
</script>

</body>
</html>
